name: Build Firmware

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      with:
        fetch-depth: 0

    - name: Get build info
      id: build_info
      run: |
        echo "commit_hash=$(git rev-parse --short HEAD)" >> $GITHUB_OUTPUT
        echo "build_date=$(date +'%Y-%m-%d')" >> $GITHUB_OUTPUT
        echo "full_commit=$(git rev-parse HEAD)" >> $GITHUB_OUTPUT

    - name: Build all presets
      run: |
        chmod +x toolchain/compile-with-meson.sh
        ./toolchain/compile-with-meson.sh All

    - name: Upload Build Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: deltafw-builds-${{ steps.build_info.outputs.commit_hash }}
        path: |
          build/deltafw.*.bin
          build/deltafw.*.hex
          build/deltafw.*.qsh

    - name: Check for Release Condition
      id: check_release
      if: github.event_name == 'push' && github.ref == 'refs/heads/main'
      run: |
        python3 toolchain/release_helper.py

    - name: Create Release
      if: steps.check_release.outputs.should_release == 'true'
      uses: softprops/action-gh-release@v1
      with:
        tag_name: ${{ steps.check_release.outputs.release_tag }}
        body: |
          ${{ steps.check_release.outputs.changelog }}
          
          ### SHA256 Checksums
          ```
          $(sha256sum build/deltafw.*.bin build/deltafw.*.hex build/deltafw.*.qsh | sed 's|build/||')
          ```
        files: |
          build/deltafw.*.bin
          build/deltafw.*.hex
          build/deltafw.*.qsh
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

    - name: Create Tag
      if: steps.check_release.outputs.should_tag_only == 'true'
      run: |
        git config user.name "github-actions[bot]"
        git config user.email "github-actions[bot]@users.noreply.github.com"
        git tag ${{ steps.check_release.outputs.release_tag }}
        git push origin ${{ steps.check_release.outputs.release_tag }}
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
